<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * data: gap: content: https://ssl.gstatic.com; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'">
    <title>ぷよぷよの制作を体験してみよう！</title>
    <script src="components/loader.js"></script>
    <script src="src/config.js"></script>
    <script src="src/stage.js"></script>
    <script src="src/score.js"></script>
    <script src="src/puyoimage.js"></script>
    <script src="src/player.js"></script>
    <script src="src/game.js"></script>
    <link rel="stylesheet" href="components/loader.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 連鎖文字用のポップアップエフェクト */
        .chain-text {
            position: absolute;
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-weight: bold;
            font-size: 28px;
            color: #fff;
            text-shadow: 
                -3px -3px 0 #ff3b30,  3px -3px 0 #ff3b30,
                -3px  3px 0 #ff3b30,  3px  3px 0 #ff3b30,
                -3px  0px 0 #ff3b30,  3px  0px 0 #ff3b30,
                 0px -3px 0 #ff3b30,  0px  3px 0 #ff3b30,
                 4px  4px 5px rgba(0,0,0,0.6);
            white-space: nowrap;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
            animation: chainPopup 0.8s ease-out forwards;
        }

        /* 1文字目（数字）を大きめにするためのスタイル */
        .chain-text span {
            font-size: 42px;
            color: #fffb00;
            text-shadow: 
                -3px -3px 0 #ff9500,  3px -3px 0 #ff9500,
                -3px  3px 0 #ff9500,  3px  3px 0 #ff9500,
                -3px  0px 0 #ff9500,  3px  0px 0 #ff9500,
                 0px -3px 0 #ff9500,  0px  3px 0 #ff9500;
            padding-right: 2px;
        }

        @keyframes chainPopup {
            0% { transform: translate(-50%, -10%) scale(0.3); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
            70% { transform: translate(-50%, -60%) scale(1.0); opacity: 1; }
            100% { transform: translate(-50%, -80%) scale(0.8); opacity: 0; }
        }
    </style>
</head>
<body style="margin:0;">
    <div id="game-wrapper" style="position: relative; margin: 0 auto; width: fit-content; display: flex;">
        <div id="stage" style="position:relative; overflow: hidden; background: url(img/puyo_2bg.png)"></div>
        <button onclick="togglePause()" style="position: absolute; top: 10px; right: 10px; padding: 6px 12px; font-size: 14px; font-weight: bold; background: #444; color: #fff; border: 2px solid #fff; border-radius: 4px; cursor: pointer; z-index: 100;">PAUSE (Esc)</button>

        <div id="side-area" style="
            position: absolute;
            left: 100%; /* ステージのすぐ右隣 */
            top: 0;
            display: flex;
            flex-direction: column;
            gap: 15px; /* ネクスト枠とタイマーパネルの間の隙間 */
            width: 120px;
            box-sizing: border-box;
        ">
            <div id="next-container" style="
                width: 100%;
                padding: 15px 0;
                background-color: rgba(0, 0, 0, 0.5);
                border-radius: 0 10px 10px 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
                box-sizing: border-box;
            ">
                <div id="next1-box" class="next-puyo-box" style="width: 60px; height: 120px; position: relative;"></div>
                <div id="next2-box" class="next-puyo-box" style="width: 60px; height: 120px; position: relative; transform: scale(0.85);"></div>
            </div>

            <div id="side-info-panel" style="font-family: sans-serif; text-align: left; pointer-events: none; width: 100%; padding: 0 10px; box-sizing: border-box;">
                <div id="timer-container" style="display: none; margin-bottom: 15px;">
                    <div style="font-size: 13px; color: #bbb; font-weight: bold; letter-spacing: 1px; margin-bottom: -2px;">TIME</div>
                    <div id="timer-display" style="font-size: 32px; color: #ffeb3b; font-weight: bold; font-family: monospace; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">120</div>
                </div>
                <div id="highscore-container" style="display: none;">
                    <div style="font-size: 13px; color: #bbb; font-weight: bold; letter-spacing: 1px; margin-bottom: -2px;">HIGH SCORE</div>
                    <div id="highscore-display" style="font-size: 32px; color: #ffffff; font-weight: bold; font-family: monospace; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">0</div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="score-wrapper" style="margin: 0 auto; width: fit-content;">
        <div id="score" style="overflow: hidden; text-align: right;"></div>
    </div>
    
    <div style="display:none">
        <img src="img/puyo_1.png" id="puyo_1">
        <img src="img/puyo_2.png" id="puyo_2">
        <img src="img/puyo_3.png" id="puyo_3">
        <img src="img/puyo_4.png" id="puyo_4">
        <img src="img/puyo_5.png" id="puyo_5">
        <img src="img/batankyu.png" id="batankyu">
        <img src="img/zenkeshi.png" id="zenkeshi">
        <img src="img/0.png" id="font0">
        <img src="img/1.png" id="font1">
        <img src="img/2.png" id="font2">
        <img src="img/3.png" id="font3">
        <img src="img/4.png" id="font4">
        <img src="img/5.png" id="font5">
        <img src="img/6.png" id="font6">
        <img src="img/7.png" id="font7">
        <img src="img/8.png" id="font8">
        <img src="img/9.png" id="font9">
    </div>
    
    <div id="message-overlay" style="
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        font-family: sans-serif;
        font-size: 24px;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        background: rgba(0,0,0,0.4);
        pointer-events: none;
        z-index: 100;
    ">
        <div id="main-message">PUYO PUYO</div>    
        <div id="menu-container" style="display: none; margin-top: 20px; font-family: sans-serif; text-align: center;">
            <div id="menu-item-0" class="menu-item selected" style="font-size: 24px; color: #fff; margin: 10px 0; cursor: pointer;">▶ とこぷよ</div>
            <div id="menu-item-1" class="menu-item" style="font-size: 24px; color: #888; margin: 10px 0; cursor: pointer;">スコアアタック</div>
            <div id="menu-item-2" class="menu-item" style="font-size: 24px; color: #888; margin: 10px 0; cursor: pointer;">ログイン</div>
        </div>
        <div id="difficulty-container" style="display: none; margin-top: 20px; font-family: sans-serif; text-align: center;">
            <div id="diff-item-0" style="font-size: 22px; color: #fff; margin: 10px 0;">▶ EASY (3 colors)</div>
            <div id="diff-item-1" style="font-size: 22px; color: #888; margin: 10px 0;">NORMAL (4 colors)</div>
            <div id="diff-item-2" style="font-size: 22px; color: #888; margin: 10px 0;">HARD (5 colors)</div>
        </div>
        <div id="ranking-container" style="display: none; position: absolute; top: 50px; left: 50%; transform: translateX(-50%); font-family: sans-serif; text-align: center; color: #fff; width: 280px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px; z-index: 1000;">
            <h3 style="color: #ffeb3b; margin-top: 0; margin-bottom: 10px;">📊 SCORE RANKING</h3>
            <div id="ranking-list" style="text-align: left; font-size: 15px; line-height: 1.5; margin-bottom: 15px;"></div>
        </div>
        <div id="sub-message">PUSH ENTER TO START</div>
    </div>
    <div id="pause-menu" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;">
        <div onclick="togglePause()" style="position: absolute; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); cursor: pointer;"></div>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(26, 26, 26, 0.95); padding: 40px 30px; border: 4px solid #fff; border-radius: 12px; text-align: center; font-family: sans-serif; min-width: 280px; box-shadow: 0 0 20px rgba(0,0,0,0.6);">
            <h2 style="margin-top: 0; margin-bottom: 30px; font-size: 26px; color: #ffcc00; letter-spacing: 2px;">PAUSE</h2>
            <div id="pause-resume-btn" onclick="togglePause()" style="font-size: 22px; color: #fff; margin: 20px 0; cursor: pointer; font-weight: bold; text-align: center;">▶ ゲームを再開する</div>
            <div id="pause-title-btn" onclick="backToTitleFromPause()" style="font-size: 22px; color: #888; margin: 20px 0; cursor: pointer; font-weight: bold; text-align: center;">タイトルに戻る</div>        </div>
    </div>
    <script src="components/loader.js"></script>
</body>
</html>
